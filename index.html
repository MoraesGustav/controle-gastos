<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Meus Gastos</title>
<style>
  :root{
    --bg: #F2F5F1;
    --paper: #FFFFFF;
    --ink: #1B2A24;
    --ink-soft: #5B6B62;
    --line: #DFE6DF;
    --green: #1F6B4C;
    --green-deep: #14432F;
    --green-tint: #E3EFE7;
    --rust: #B4552E;
    --rust-tint: #F8E8DE;
    --danger: #B23A3A;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height:100vh;
    padding-bottom: 100px;
  }
  .wrap{
    max-width: 480px;
    margin: 0 auto;
    padding: 0 16px;
  }
  header{
    padding: 28px 16px 18px;
    text-align:center;
  }
  header .eyebrow{
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 600;
    margin: 0 0 4px;
  }
  header h1{
    font-size: 22px;
    margin: 0;
    font-weight: 700;
    color: var(--green-deep);
  }

  .month-nav{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 14px;
    margin: 18px 0 4px;
  }
  .month-nav button{
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--paper);
    color: var(--green-deep);
    font-size: 18px;
    font-weight: 700;
    cursor:pointer;
  }
  .month-nav button:active{ transform: scale(0.94); }
  .month-label{
    font-size: 16px;
    font-weight: 700;
    text-transform: capitalize;
    min-width: 150px;
    text-align:center;
  }

  .total-card{
    background: var(--green-deep);
    color: #F4F8F5;
    border-radius: 18px;
    padding: 22px 20px;
    margin: 18px 0;
    text-align:center;
  }
  .total-card .label{
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.75;
    margin: 0 0 6px;
  }
  .total-card .value{
    font-family: "SFMono-Regular", Menlo, Consolas, monospace;
    font-size: 34px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .total-card .sub{
    margin-top: 8px;
    font-size: 12.5px;
    opacity: 0.8;
  }

  .section-title{
    font-size: 13px;
    font-weight: 700;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 22px 4px 10px;
  }

  .cat-list{
    display:flex;
    flex-direction:column;
    gap: 8px;
  }
  .cat-row{
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 14px;
  }
  .cat-row .top{
    display:flex;
    justify-content:space-between;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .cat-row .top .val{
    font-family: Menlo, Consolas, monospace;
    color: var(--rust);
  }
  .bar-bg{
    height: 6px;
    background: var(--green-tint);
    border-radius: 4px;
    overflow:hidden;
  }
  .bar-fill{
    height:100%;
    background: var(--green);
    border-radius: 4px;
  }

  .expense-list{
    display:flex;
    flex-direction:column;
    gap: 8px;
  }
  .expense-item{
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap: 10px;
  }
  .expense-item .info{
    min-width:0;
  }
  .expense-item .desc{
    font-size: 14.5px;
    font-weight: 600;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .expense-item .meta{
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 2px;
  }
  .expense-item .cat-tag{
    display:inline-block;
    background: var(--green-tint);
    color: var(--green-deep);
    font-size: 11px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 6px;
    margin-right: 6px;
  }
  .expense-item .right{
    display:flex;
    align-items:center;
    gap: 10px;
    flex-shrink:0;
  }
  .expense-item .amount{
    font-family: Menlo, Consolas, monospace;
    font-weight: 700;
    font-size: 15px;
  }
  .expense-item .del{
    background: none;
    border: none;
    color: var(--danger);
    font-size: 20px;
    line-height:1;
    cursor:pointer;
    padding: 4px;
  }

  .empty{
    text-align:center;
    color: var(--ink-soft);
    font-size: 14px;
    padding: 30px 10px;
    background: var(--paper);
    border: 1px dashed var(--line);
    border-radius: 12px;
  }

  .fab{
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--green);
    color: white;
    border: none;
    border-radius: 999px;
    padding: 15px 26px;
    font-size: 15px;
    font-weight: 700;
    box-shadow: 0 6px 18px rgba(20,67,47,0.35);
    cursor:pointer;
    display:flex;
    align-items:center;
    gap: 8px;
  }
  .fab:active{ transform: translateX(-50%) scale(0.96); }

  .overlay{
    position: fixed;
    inset: 0;
    background: rgba(20,30,25,0.45);
    display:flex;
    align-items:flex-end;
    justify-content:center;
    z-index: 50;
  }
  .overlay.hidden{ display:none; }
  .sheet{
    background: var(--paper);
    width: 100%;
    max-width: 480px;
    border-radius: 20px 20px 0 0;
    padding: 22px 20px 26px;
  }
  .sheet h2{
    margin: 0 0 16px;
    font-size: 17px;
    font-weight: 700;
    color: var(--green-deep);
  }
  .field{ margin-bottom: 14px; }
  .field label{
    display:block;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .field input, .field select{
    width: 100%;
    padding: 11px 12px;
    border-radius: 10px;
    border: 1px solid var(--line);
    font-size: 15px;
    background: var(--bg);
    color: var(--ink);
    font-family: inherit;
  }
  .field input:focus, .field select:focus{
    outline: 2px solid var(--green);
    outline-offset: 1px;
  }
  .row2{ display:flex; gap:10px; }
  .row2 .field{ flex:1; }

  .sheet-actions{
    display:flex;
    gap: 10px;
    margin-top: 6px;
  }
  .sheet-actions button{
    flex:1;
    padding: 13px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    border: none;
    cursor:pointer;
  }
  .btn-cancel{
    background: var(--bg);
    color: var(--ink-soft);
    border: 1px solid var(--line) !important;
  }
  .btn-save{
    background: var(--green);
    color: white;
  }

  .toast{
    position: fixed;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--green-deep);
    color: white;
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 13.5px;
    font-weight: 600;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.25s;
    pointer-events:none;
  }
  .toast.show{ opacity: 1; }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <p class="eyebrow">Controle de gastos</p>
    <h1 id="app-title">Meus Gastos</h1>
  </header>

  <div class="month-nav">
    <button id="prev-month" aria-label="Mês anterior">‹</button>
    <div class="month-label" id="month-label">—</div>
    <button id="next-month" aria-label="Próximo mês">›</button>
  </div>

  <div class="total-card">
    <p class="label">Total do mês</p>
    <div class="value" id="total-value">R$ 0,00</div>
    <p class="sub" id="total-sub">0 gastos registrados</p>
  </div>

  <div id="cat-section">
    <p class="section-title">Por categoria</p>
    <div class="cat-list" id="cat-list"></div>
  </div>

  <p class="section-title">Gastos do mês</p>
  <div class="expense-list" id="expense-list"></div>
</div>

<button class="fab" id="open-add">+ Adicionar gasto</button>

<div class="overlay hidden" id="overlay">
  <div class="sheet">
    <h2>Novo gasto</h2>
    <div class="field">
      <label for="f-desc">Descrição</label>
      <input type="text" id="f-desc" placeholder="Ex: Mercado, Uber, Aluguel">
    </div>
    <div class="row2">
      <div class="field">
        <label for="f-valor">Valor (R$)</label>
        <input type="number" id="f-valor" placeholder="0,00" step="0.01" inputmode="decimal">
      </div>
      <div class="field">
        <label for="f-data">Data</label>
        <input type="date" id="f-data">
      </div>
    </div>
    <div class="field">
      <label for="f-cat">Categoria</label>
      <select id="f-cat">
        <option>Alimentação</option>
        <option>Transporte</option>
        <option>Moradia</option>
        <option>Lazer</option>
        <option>Saúde</option>
        <option>Compras</option>
        <option>Contas</option>
        <option>Outros</option>
      </select>
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel" id="cancel-add">Cancelar</button>
      <button class="btn-save" id="save-add">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MESES = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
let expenses = [];
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();

function fmtMoney(n){
  return "R$ " + n.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function monthKey(y,m){ return y + "-" + String(m+1).padStart(2,'0'); }

async function loadExpenses(){
  try{
    const raw = localStorage.getItem('expenses');
    expenses = raw ? JSON.parse(raw) : [];
  }catch(e){
    expenses = [];
  }
  render();
}

async function saveExpenses(){
  try{
    localStorage.setItem('expenses', JSON.stringify(expenses));
  }catch(e){
    showToast("Erro ao salvar. Tente de novo.");
  }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 1800);
}

function getMonthExpenses(){
  const key = monthKey(currentYear, currentMonth);
  return expenses.filter(e => e.date.slice(0,7) === key);
}

function render(){
  document.getElementById('month-label').textContent = MESES[currentMonth] + " de " + currentYear;

  const monthExp = getMonthExpenses().sort((a,b)=> b.date.localeCompare(a.date));
  const total = monthExp.reduce((s,e)=> s + e.amount, 0);

  document.getElementById('total-value').textContent = fmtMoney(total);
  document.getElementById('total-sub').textContent = monthExp.length + (monthExp.length === 1 ? " gasto registrado" : " gastos registrados");

  const catMap = {};
  monthExp.forEach(e=>{
    catMap[e.category] = (catMap[e.category] || 0) + e.amount;
  });
  const catList = document.getElementById('cat-list');
  const catSection = document.getElementById('cat-section');
  catList.innerHTML = '';
  const cats = Object.entries(catMap).sort((a,b)=> b[1]-a[1]);
  if(cats.length === 0){
    catSection.style.display = 'none';
  } else {
    catSection.style.display = '';
    cats.forEach(([cat, val])=>{
      const pct = total > 0 ? Math.round((val/total)*100) : 0;
      const row = document.createElement('div');
      row.className = 'cat-row';
      row.innerHTML = `
        <div class="top"><span>${cat}</span><span class="val">${fmtMoney(val)}</span></div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
      `;
      catList.appendChild(row);
    });
  }

  const list = document.getElementById('expense-list');
  list.innerHTML = '';
  if(monthExp.length === 0){
    list.innerHTML = '<div class="empty">Nenhum gasto neste mês ainda.<br>Toque em "Adicionar gasto" para começar.</div>';
    return;
  }
  monthExp.forEach(e=>{
    const d = new Date(e.date + "T00:00:00");
    const dstr = d.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'});
    const item = document.createElement('div');
    item.className = 'expense-item';
    item.innerHTML = `
      <div class="info">
        <div class="desc">${escapeHtml(e.description)}</div>
        <div class="meta"><span class="cat-tag">${e.category}</span>${dstr}</div>
      </div>
      <div class="right">
        <span class="amount">${fmtMoney(e.amount)}</span>
        <button class="del" data-id="${e.id}" aria-label="Excluir">×</button>
      </div>
    `;
    list.appendChild(item);
  });

  document.querySelectorAll('.del').forEach(btn=>{
    btn.onclick = async ()=>{
      expenses = expenses.filter(e=> e.id !== btn.dataset.id);
      await saveExpenses();
      render();
      showToast("Gasto excluído");
    };
  });
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

document.getElementById('prev-month').onclick = ()=>{
  currentMonth--;
  if(currentMonth < 0){ currentMonth = 11; currentYear--; }
  render();
};
document.getElementById('next-month').onclick = ()=>{
  currentMonth++;
  if(currentMonth > 11){ currentMonth = 0; currentYear++; }
  render();
};

const overlay = document.getElementById('overlay');
document.getElementById('open-add').onclick = ()=>{
  document.getElementById('f-desc').value = '';
  document.getElementById('f-valor').value = '';
  document.getElementById('f-data').value = new Date().toISOString().slice(0,10);
  document.getElementById('f-cat').selectedIndex = 0;
  overlay.classList.remove('hidden');
  document.getElementById('f-desc').focus();
};
document.getElementById('cancel-add').onclick = ()=>{
  overlay.classList.add('hidden');
};
overlay.onclick = (e)=>{
  if(e.target === overlay) overlay.classList.add('hidden');
};

document.getElementById('save-add').onclick = async ()=>{
  const desc = document.getElementById('f-desc').value.trim();
  const valor = parseFloat(document.getElementById('f-valor').value);
  const data = document.getElementById('f-data').value;
  const cat = document.getElementById('f-cat').value;

  if(!desc){ showToast("Digite uma descrição"); return; }
  if(!valor || valor <= 0){ showToast("Digite um valor válido"); return; }
  if(!data){ showToast("Escolha uma data"); return; }

  const newExpense = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,7),
    description: desc,
    amount: valor,
    date: data,
    category: cat
  };
  expenses.push(newExpense);
  await saveExpenses();

  const [y,m] = data.split('-').map(Number);
  currentYear = y;
  currentMonth = m - 1;

  overlay.classList.add('hidden');
  render();
  showToast("Gasto adicionado");
};

loadExpenses();
</script>

</body>
</html>
